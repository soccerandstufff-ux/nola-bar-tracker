<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N'awlins Bar Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --bg: #0D0800; --surface: #180F02; --surface2: #211505;
    --border: rgba(201,168,76,0.18); --text: #F0E6CC; --muted: rgba(240,230,204,0.5);
    --quiet: #2a9d4e; --moderate: #e9a825; --busy: #e05c2b; --packed: #c0392b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 60px; }
  header { text-align: center; margin-bottom: 48px; }
  header .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; opacity: 0.8; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(38px, 7vw, 64px); font-weight: 900; line-height: 1; color: var(--gold); text-shadow: 0 0 60px rgba(201,168,76,0.3); margin-bottom: 8px; }
  header p { font-size: 14px; color: var(--muted); font-style: italic; }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .last-updated { font-size: 12px; color: var(--muted); margin-left: auto; }
  .refresh-btn { padding: 8px 20px; background: transparent; border: 1px solid var(--gold); border-radius: 999px; color: var(--gold); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: var(--gold); color: var(--bg); }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; animation: fadeUp 0.4s ease both; }
  .card:hover { border-color: rgba(201,168,76,0.45); transform: translateY(-2px); }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .card-top-bar { height: 4px; }
  .card-body { padding: 20px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .bar-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.2; color: var(--text); flex: 1; margin-right: 10px; }
  .bar-address { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .status-pill { font-size: 10px; font-weight: 500; padding: 4px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .meter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .meter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .meter-pct { font-size: 22px; font-weight: 500; font-family: 'Playfair Display', serif; }
  .meter-track { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; margin-bottom: 14px; }
  .meter-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.34,1.2,0.64,1); }
  .info-chip { font-size: 11px; padding: 4px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: var(--muted); margin-bottom: 14px; display: inline-block; }
  .sparkline { display: flex; gap: 2px; align-items: flex-end; height: 28px; }
  .spark-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 3px; }
  .sparkline-label { font-size: 10px; color: var(--muted); margin-top: 4px; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .loading-shimmer { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 14px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  footer { text-align: center; margin-top: 48px; font-size: 12px; color: var(--muted); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 24px; }
  footer a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">Uptown New Orleans</div>
    <h1>Bar Pulse</h1>
    <p>Real-time busyness for your favorite spots</p>
  </header>
  <div class="controls">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <span id="refresh-icon">↻</span> Refresh
    </button>
    <div class="last-updated" id="last-updated">Loading...</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--quiet)"></div> Quiet (0–30%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--moderate)"></div> Moderate (30–60%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--busy)"></div> Busy (60–80%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--packed)"></div> Packed (80–100%)</div>
  </div>
  <div class="grid" id="bar-grid"></div>
  <footer>
    Data sourced from Google Maps via SerpApi<br>
    Built for Uptown NOLA bar-hoppers
  </footer>
</div>
<script>
const BARS = [
  { name:"The Boot",       address:"1039 Broadway St",      place_id:"ChIJpfxxr1CkIIYRGpAqzoTQ-Zo", emoji:"🥾" },
  { name:"The Palms",      address:"7130 Freret St",         place_id:"ChIJuZD5WxClIIYRWFw1Zj6Bp5k", emoji:"🌴" },
  { name:"F&M Patio Bar",  address:"4841 Tchoupitoulas St",  place_id:"ChIJp328jhClIIYRchwhTibmIF0", emoji:"🍺" },
  { name:"Snake & Jake's", address:"7612 Oak St",            place_id:"ChIJE2MvTBGlIIYRdbXdpRqY9u0", emoji:"🎄" }
];
function getColor(v) {
  if (v===null) return '#555';
  if (v<30) return 'var(--quiet)'; if (v<60) return 'var(--moderate)';
  if (v<80) return 'var(--busy)'; return 'var(--packed)';
}
function getLabel(v) {
  if (v===null) return ['No data','rgba(255,255,255,0.06)','rgba(255,255,255,0.3)'];
  if (v<30) return ['Quiet','rgba(42,157,78,0.15)','#2a9d4e'];
  if (v<60) return ['Moderate','rgba(233,168,37,0.15)','#e9a825'];
  if (v<80) return ['Busy','rgba(224,92,43,0.15)','#e05c2b'];
  return ['Packed','rgba(192,57,43,0.2)','#c0392b'];
}
function getDayKey() {
  return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
}
function buildSparkline(weekly, color) {
  const hours = weekly?.[getDayKey()];
  if (!hours||!hours.length) return '<div style="font-size:11px;color:var(--muted);font-style:italic">No weekly pattern available</div>';
  const max = Math.max(...hours.map(h=>h.busyness_score||0),1);
  const nowH = new Date().getHours();
  const nowLabel = nowH===0?'12 am':nowH<12?`${nowH} am`:nowH===12?'12 pm':`${nowH-12} pm`;
  const bars = hours.map(h=>{
    const val=h.busyness_score||0, ht=Math.round((val/max)*26)+2;
    const cur=(h.time||'').toLowerCase()===nowLabel;
    return `<div class="spark-bar" style="height:${ht}px;background:${color};opacity:${cur?1:0.3}"></div>`;
  }).join('');
  return `<div class="sparkline-label"><span>12am</span><span>now</span><span>11pm</span></div><div class="sparkline">${bars}</div>`;
}
function loadingCard(bar) {
  return `<div class="card"><div class="card-top-bar" style="background:rgba(201,168,76,0.2)"></div><div class="card-body">
    <div class="card-header"><div><div class="bar-name">${bar.emoji} ${bar.name}</div><div class="bar-address">${bar.address}</div></div></div>
    <div class="loading-shimmer" style="margin-bottom:8px;width:40%"></div>
    <div class="loading-shimmer" style="margin-bottom:16px"></div>
    <div class="loading-shimmer" style="height:28px"></div>
  </div></div>`;
}
function renderCard(bar, r, i) {
  const {live,info,weekly}=r, color=getColor(live), [label,bgc,tc]=getLabel(live);
  const spark=weekly?buildSparkline(weekly,color):'<div style="font-size:11px;color:var(--muted);font-style:italic">No historical data</div>';
  const infoText=info||(live===null?'No Google busyness data for this bar yet':'');
  return `<div class="card" style="animation-delay:${i*0.08}s">
    <div class="card-top-bar" style="background:${color}"></div>
    <div class="card-body">
      <div class="card-header">
        <div><div class="bar-name">${bar.emoji} ${bar.name}</div><div class="bar-address">${bar.address}</div></div>
        <span class="status-pill" style="background:${bgc};color:${tc}">${label}</span>
      </div>
      <div class="meter-row"><span class="meter-label">Busyness</span><span class="meter-pct" style="color:${color}">${live!==null?live+'%':'—'}</span></div>
      <div class="meter-track"><div class="meter-fill" style="width:${live||0}%;background:${color}"></div></div>
      ${infoText?`<div class="info-chip">📍 ${infoText}</div>`:''}
      ${spark}
    </div>
  </div>`;
}
async function fetchBar(bar) {
  try {
    const res = await fetch(`/api/busyness?place_id=${bar.place_id}`);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch(e) {
    return {live:null, info:'Could not load data', weekly:null};
  }
}
async function loadAll() {
  const grid=document.getElementById('bar-grid'), btn=document.getElementById('refresh-btn'), icon=document.getElementById('refresh-icon');
  btn.disabled=true; icon.classList.add('spin');
  grid.innerHTML=BARS.map(b=>loadingCard(b)).join('');
  const results=await Promise.all(BARS.map(b=>fetchBar(b)));
  grid.innerHTML=BARS.map((bar,i)=>renderCard(bar,results[i],i)).join('');
  document.getElementById('last-updated').textContent=`Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  btn.disabled=false; icon.classList.remove('spin'); icon.textContent='↻';
}
loadAll();
</script>
</body>
</html>
